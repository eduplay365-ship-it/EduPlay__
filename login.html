<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduPlay - Welcome</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .auth-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem;
            background: var(--bg-color);
        }

        .auth-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 2rem;
            padding: 3rem;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4);
            text-align: center;
        }

        .auth-logo {
            margin-bottom: 2rem;
        }

        .auth-logo .logo-icon {
            width: 80px;
            height: 80px;
            background: var(--primary-gradient);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            color: white;
            margin: 0 auto 1.5rem;
            box-shadow: 0 8px 24px rgba(99, 102, 241, 0.4);
        }

        .auth-logo h1 {
            font-size: 2rem;
            font-weight: 700;
            color: var(--text-color);
            margin: 0;
        }

        .auth-logo p {
            color: var(--text-muted);
            font-size: 1.1rem;
            margin-top: 0.5rem;
        }

        .btn-enter {
            width: 100%;
            padding: 1.2rem;
            background: var(--primary-gradient);
            border: none;
            border-radius: 1rem;
            color: white;
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3);
            font-family: 'Inter', sans-serif;
            margin-top: 1rem;
        }

        .btn-enter:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 15px 30px rgba(99, 102, 241, 0.4);
        }

        .version-note {
            margin-top: 2rem;
            font-size: 0.85rem;
            color: var(--text-muted);
            opacity: 0.6;
        }
    </style>
</head>

<body>
    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="auth-logo">
                <div class="logo-icon"><i class="fas fa-gamepad"></i></div>
                <h1>EduPlay</h1>
                <p data-i18n="welcome">EduPlay ga xush kelibsiz</p>
            </div>

            <button class="btn-enter" onclick="enterApp()">
                <i class="fas fa-play"></i> <span>Kirish</span>
            </button>

            <p class="version-note">Local Version 1.0.0</p>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        function enterApp() {
            localStorage.setItem('guestMode', 'true');
            window.location.href = 'index.html';
        }
    </script>
</body>

</html>
